<!DOCTYPE html>

<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StageFear Breaker — Auth</title>
<link rel="stylesheet" href="/static/css/main.css">
</head>

<body class="auth-page">

<div class="auth-container">

  <!-- TABS -->

  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- LOGIN FORM -->

  <form id="login-form" class="auth-form active">
    <h2>Sign In</h2>

```
<input id="login-username" type="text" placeholder="Username" required>
<input id="login-password" type="password" placeholder="Password" required>

<div id="login-error" class="auth-error hidden"></div>

<button type="submit" id="login-btn">Sign In</button>
```

  </form>

  <!-- SIGNUP FORM -->

  <form id="signup-form" class="auth-form">
    <h2>Create Account</h2>

```
<input id="signup-username" type="text" placeholder="Username" required>
<input id="signup-email" type="email" placeholder="Email" required>
<input id="signup-password" type="password" placeholder="Password" required minlength="8">

<div id="signup-error" class="auth-error hidden"></div>

<button type="submit" id="signup-btn">Create Account</button>
```

  </form>

</div>

<!-- JS FILE -->

<script src="/static/js/auth.js"></script>

<!-- EVENT BINDING (IMPORTANT) -->

<script>
document.getElementById("login-form").addEventListener("submit", handleLogin);
document.getElementById("signup-form").addEventListener("submit", handleSignup);
</script>

</body>
</html>
